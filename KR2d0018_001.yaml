front:
  text: 浙語二查東山筆沈仲方閲
  hash: sha256:449576994e80b586dac56b127bf63a77912b08892d69e2dcaf1b3808bab470a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0018_SBCK_001-1a}
body:
  text: 髙岱髙朗朱大綱張鵬翼周宗彝馬鳴雷方維新沈陵蔡瑛許定俞元良潘起龍僧穎石徐職方徐汝琦通城王盛澄髙岱字白浦丗千户籍居浙之瀝海所性恬浹不隨時好游學京師詹事李括蒼館穀之當崇禎庾午借籍登順天賢書有者訐岱非籍時功令嚴竟革岱京師諸顯達惜岱被爭延為客久方歸浙甲申南都新立以恩例復賢書魯監國紹授職方司主事岱嚴重自守善撫恤軍士敵以下咸樂為用丙戍事敗岱避居鄉僻岱有次子朗先以諸生殉國難云朗字克楊乙以父命執贄余門尋余從子馨令會稽録童子試克楊尚未冠得第一倒覆試題為事君能致其身克楊直用武侯出師表成句鞠躬盡瘁死而後巳作題破邑令歎息曰此子行以忠孝著聞者哉巳列膠庠俄監國渡海克揚獨詣蔡林廟誓神粘所著檄文祠旁還荷槊見父曰兒將為所欲為父白浦以大勢且去力止之曰即否許我死父始哀其志不果禁克揚之師邵孟達囑其同學陳虞生善伺之中道虞生默念曰朗將死忠某既不能安得厄以師命輒記故别去朗整青襟走儞浦江問渡嗣至中流朗忽起躍水梢子捷遽援以子朗騰擲不得脫嚙梢子手痛得脫去隨流下同渡驚愕多為泣下儞江潮汐往來髙下十餘文明日家人浮舟招魂第望洋一哭舟子乃從故躍處試以篙築之曰此豫乎負痛援不力處則篙如附物有衣襟鈎篙末起視則朗尸也里人益駭重之白浦歎曰朗兒導我矣亦竟具櫬正寢餓十餘日未即死忽作克揚言曰兒朗為帝廷所鑒明午來迎大人果明午白浦整冠帶逝蓋克揚初欲盡瘁見節徒死非其意常影響江之涘業海諸百姓共祠之如蔡林廟禱輒驗時里邵大有者亦感克揚之義來陪白浦餓榻三日起謝白浦去曰死之難如此翁獨為之朱大綱字振揚海寧衛世襲千户乙酉潞王奉杭州北欵以義集同官蔡國瑛許定咸來赴大綱議曰會城失守人心故不去當有起者急固圉以待聘僧穎石為先鋒馳擊崇德新令殪一大帥尋以進士俞元良主餉嚴守海寧氣頗屬㑹城偏師自西南來佯不進俄一夜薄城困圍數日餉匱援絶國瑛守北門戰不利投河死定復巷戰被創死有鎮撫潘起龍守南門敗死大綱主兵見城陷投井死元良與兄伯昭皆見殺㑹硤石周宗彝五重龍山左尹等各師次第來援㑹城之單見援師四集棄城去及左尹南渡空城不守者三月五重復退保硤石五重以字行已卯孝亷聯合諸旅海寧崇德海鹽皆五重聲勢所及三方並應故大軍不敢迫久之硤石有大豪素與五重有隙隂以虛實北告且為內應于是大軍四集內應者開一旁竇以招北軍內遂潰五重率衆巷戰死張鵬翼字效先浙諸暨人崇禎中以副將軍分鎮山海關甲申國變總兵吳三桂投滿洲乞師效先率衆南歸與巡撫田仰渡海至浙東魯監國以田仰有蹈海功拜內閣命鵬翼駐守寧波復調禦三衢鵬翼部衆律嚴江東獨稱有制之兵丙戌二月封永豐伯常城市身露立竟夜兵不得入民居禁私掠逺近感慕有弟繼榮尤英健樂為前驅初鵬翼率弟繼榮至龍游人告益陽王擅制諸不鵬翼曰請得聞監國王輒閉關不納矢石交下鵬翼不得已揮軍進城中民啓門迎王中流矢因疏狀監國不問遂至衢時淳安與開化俱失大敵已逼常山鵬翼令繼榮守常山進扼淳安與北軍搏衆寡懸絶自卯至午殺敵卒過當刀折復出佩刀相拒日晡敵後軍繼至戰却退至常山敵師躡之及闢疑有備不敢入繼榮憤其敗績引佩刀自剄北寺中六月紹興不守金華破八月及衢鵬翼與通城王盛澄及徐職方等為死守計王督三門鵬翼亦督三門旦日為死決而通城標將內叛暗馳約開門入敵鵬翼見執不屈死中軍徐汝琦亦不屈死通城盛澄早引決矣徐職方同日遇害馬鳴雷字伯臺浙平湖人介然自守不肯輕折人以例恩貢乙酉閏六月平湖起兵應魯鳴雷與諸生馬萬方等手搏新令朱龍圖殺之往戍嘉興不得進還忽傳有使者奉喜詔至兒童婦女皆歡呼鄉邑士民填塞衢巷馳聽公堂者萬人詔有以今年為神武元年大赦天下與民更始云云其恩例二十九條時道路梗塞風傳南都復蓋鳴雷與其黨僞為此詔以鼓三吳之義者頌布各邑聞者涕泣久之事不實各屯漸散廢平湖復不守鳴雷見執不屈從容就法方維新浙之紹與籍崇禎癸未進士未就選南都繼變維新避入舟山魯王監國仍入內地從少年角起移屯開北以王正五夏癸石為將每有戰功唐閩加維新為巡撫都御史嗣魯唐繼敗維新奔林莾雄於常玉雨山之間曽和文信國沁園春一闋首云帝王治道春秋晝法其尾署大明臣方維新拜草暨各師廢散維新戰不利棄去謝左右懷印隻身詣金華大言曰我大明都御史求死至此必輿我見爾鎮將一言而訣既見不屈鎮將曰此何時乃相抗哉維新曰即知不可為之而不成如今者可以含笑入地矣與之食不肯食日飲清水數勺逮杭談笑如常時主者發滿營磔死海寧龍山有賈人兒沈陵字湘岸年十三攻奕復善謳薄暮長謳觀者徘徊色動許效翁沈聞大偕事偶過之載以歸舍董摨升家放文學撰文字多用詞家豔曲就正放翁放翁笑曰兒未解制義因示以孔孟之書並王季重湯若士小題數首陵敏慧一夜熟習之輒撫兀太息曰士以此得當時月遽髙寇束帶無異人者哉於是揣摩就頗有别解蓋奕學故不廢歌益善也年十七游邑庠同學盡遊楊延譽糧不見取於陳潜夫曰吾見其為完湫巷中無所不押侮乃與長者並坐陵拂衣起曰臣中欲為何所不如公乃相厄哉乙酉六月陵仗劍間走海上受計監軍荆本徹得兵符反號衆誑言海師巳復潤州斤下毗陵以壯諸營之膽時所在挺起陵統之劫北兵於隘幸勝者再已而遇大軍於郭店戰不勝衆潰散陵獨殿後中流矢殁於陳浙語三查東山筆沈仲方閲陸士鉉陸韜黃銑張實孚錢士馨吳統持陸士鉉字古雪諸生浙江平湖人唐宣公苗裔祖大司冦果也士鉉性端亮篤孝義主意以程朱為法少年腐之膺歲貢有所不平於時常取三朝實録私自修訂於五經頗有闡發兼次兵農大略甲申之變士鉉初聞之驚狂走室中繞可百十計口咄咄不解所云問之不應若失心者旋設位哭臨曰嗟乎二百七十七年此家竟奪去也復誦先帝臨難書襟語則又哭哭又走如是雨日夜嘔血數升絶飲食三月腸痿氣盡獨乎書吾皇吾皇數遍子六人環侍不能勸始終不及家事一語長號而絶時以諸生潜通海聯合浙西者則有陸韜黃銑韜字元聲海寧人乙酉從父衛百户龍與弟仲奮起復海寧旋敗仲陳死韜潜走期會太湖吳易軍蓋蠟丸潮汐五六矣最後被邏者所獲逮訊盛作夸詞不屈死銑字冲字餘姚人季父某以大銜提重較出沒武康諸山銑往來海口常以北情輸海故弄潮人得先為之傋或發之口嚼所擕書不盡數姓訊者按姓責名不吐捊至死體糜盡不可得一人竟死張實孚永嘉諸生也戊子陳倉起兵陶坑破東陽實孚示奮永嘉之六甲山以應之久之倉敗實景寡聲援據險自保北師招之不肯赴久之食盡衆散有健兒最少勇於義實孚故曰度吾不能復起子盍以吾出為功健兒曰是何言請先自剄公前明不二實孚曰果如是當並屬所善僧某遂傾囊六十金付僧曰以此金埋吾兩人土惟僧以棄溝壑亦惟僧又以三札分上當事書於石壁於是正衣冠自縊於右松下健兒亦抽刀自剄實孚之旁僧果收兩尸棺而瘞之然後以所書石壁事鳴於當事中有云實孚死明為順於北師為逆矣北師果不容有逆子則吾兒從重典可也母老不解事惟哀憐之北師欲發棺以驗虛實忽大聲起於石壁壁裂懼而止母與子俱獲全當湖錢士馨字稚拙志不隨俗喜讀漢以前書下筆雄奇自負世多笑之惟與曹鑒躬俞右吉為詩文密契既而選貢游京師親遭國變據所見勒成一書名甲申紀事擕之南還出都飲故人酒詩云旅次春風逐夢遇且彈胡拍賦長歌銜杯豈是忘愁者不醉其如天下何平昔山川誰共賞亂離日月正無多幾時江上銷兵氣好汲安流洗畫戈適有周王孫者在太湖諸營中事敗匿當湖士馨哀王孫而進一飯復過訪郡文學吳巨乎吳亦以王孫故禮貌之助以資斧或寄宿於吳名統持乙酉仲夏傾家鼓諸義勇城守月餘城陷巨乎奔浙東抵閩唐藩稱尊於福州愛重統持偶與鄭芝龍忤辭職閩敗歸禾當其少年負奇與稚拙聲望相亞或發周王孫事二子並錮武林獄踰年獄中有宋刻梅花石巨子有詩云南宋梅花石偏於獄底存雪時鮮瓣顯春盡弱枝翻祗有橫斜影曾無釜鑿痕幾多垂死客和血暗中捫又示獄吏詩此囚原辦死全鐵喜囊頭獄吏憑驅遣榆錢不浪投有愁惟獨飲無食合相周何得拘常例仍嫌禮數偷其詩多矯倔見志久之以無所跡得釋二子家破雖困極不隨俗俯仰錢更傲睨人恨之借甲申紀事以駕禍錢憤悶而卒巨乎聞錢卒亦悒鬱死年皆不及五十浙語四東山散筆墨庵補述朱大典張國維張世鳳沈蘭吳邦璿方召熊汝霖乙酉五月唐藩入閩魯主起越閩越舉義各事其事如人之左右手不相為用徴論閩越即紹興金華隱苦敵國越與越亦不相為用當是時金華朱大典字未孩以原官兵部右侍郎弘光加尚書大典自南都歸募土人城守以沈蘭為中軍備戒嚴人始有固志適南都總兵方國安以奸相馬士英東渡竄金華大典惡士英橔討其罪狀閉關不納國安攻之不得入㑹義興伯鄭遵謙北禦錢塘國安移屯東輿義興協而東陽張國維字壬笥原官兵部尚書魯王監國進東閣大學士監方國安軍與國安愜諸營無所統策之不應國維疏請築壇循故事拜國安荆國大將軍以節制江上而諸師不相統如放也閩中知金華獨自為戰密授敕監國聞之晉大典東閣大學士兼兵部尚書唐晉大典亦如魯銜雨受之唐主擬視師駐蹕金華已不果是時江上魯文武皆因大典受雨銜咸奉表閩中謂閩越合可以為名方朱合而兵無敵矣隆武乃下詔監國以御史劉中藻為使文武諸臣皆曰今日愔形不宜與唐三開詔便獨兵部尚書熊汝霖國舅張國俊中書舍人謝龍震與閣臣國維四人不從衆議遣職方司柯夏卿等致書於唐稱叔父云云江上諸臣巳潜奉表於唐矣國維仗劍伏闕曰巨得以義貴諸臣夫魯以數郡起憑匹夫之怒當全盛之敵破矢折戈勞苦江上者纍數月而閩以回逺奄然苟安即不助豫乃令束而待命今日請太祖高皇帝坐定此案唐魯得失豈止尋丈哉且夫乘人之危而因以利之者不仁孤人之勢而隂誘其衆者不義亦思魯衆一退當堅者故非唐乎是自破衛也以身為邊也凡我有官君子矢事於魯移奉叔父亦稱三心即以勢臨孤危當為國死今日復有以奉閩為言者臣主斬之群議始息中書龍震猝起辱詔使劉中藻於廷中藻倉皇走入金華大典重加之禮以兵䘙之出境乙酉十二月國維見查職方嵊赭山之捷令其子將軍世鳳從國安突進朱橋以長河國維之師為後援機露北師截援長河師潰退歸前師深入遇敵伏漢土選鋒五千亂竄無復歸路皆解甲降國安得脫而越勢大沮國維深悔之㑹䔥山公署掘地得銅炮四十二上書洪武年月一時以為祥國維計作神炮領之睨江一發抵武林破垜再發而炮裂不任用敵頗畏不敢進丙戌三月閩中閣部黃鳴俊偕定鹵伯鄭鴻逵以師出衢州窺新安魯疑閩師入界遣御史柯夏鄉王紹美出講埾共事之約行急不備犒金華大典遣使犒軍閩師喜按伍而去三衢得秋毫無所犯或謂大典曲事唐夫鄰境出師以衛社稷我有同患侁其脯資餼牽以捍牧圉禮也我則無禮而以行禮為曲無万不可乎金華城守不備江軍實有數故金華之餉頗饒大典軍令嚴令營中有私取民間物者以法夏四月中軍蘭偶犯法見戮臨刑大呼殺蘭吾見朱公不能獨老金華也五月方師大潰於桐廬守江飢卒不復振朱見敵而走北師於桐江上流東渡監國入海國維還東陽東陽破或告國維入山避敵國維大言曰誤天下者學文山叠山者也投池中死子二畏總兵官世鳯逮至杭輿同事五中餘人並被害北師既下紹興進魯於台不及溫處寧波皆下乃以全師攻金華大典閈關拒守矢石變下敵間受傷乃以書招大典啖以封拜大典峻詞拒之俟閩援援不至大勢將蹶有吳邦璿者山隂人以都督同知代沈蘭為中軍曰事急矣請裹身出戰大典許之乍遇敵敵以偏師來誘我師稍捷遂乘勝而前北師邀截其後前後受敵敗還創甚令其妻縊死而身詣城隍廟四拜自剄俄而城陷大典縱火自焚其家人盡而身躣入火死時有江山令方名善恤其衆聞金華被屠泣諭父老孤城不足抗徒死無益整冠帶同其妻赴井死百姓哀之共為營葬祠於邑中輪曰越以閩為後應閏以越為屏蔽彼此同力或可以自存而不相呼應方人有云唇亡齒寒猶不聞之乎惜玉笥在廷以公心數衆而衆不應未孩守婺相通閩越而閩終不為之援所謂閩興越不相為用越與越亦不相為用也余故感朱張之志序次而合論之浙語五東山散筆墨庵補述陳函輝陳潜夫自越事起有奉魯而不以事自見者為陳寒山奉魯而拮据江干者為陳玄倩不幸事敗咸慷慨赴水稱二陳云寒山名函輝初字木叔生時父三槐夢楊椒山過訪逮長拆椒為字隨父之任南康入曹洞山受性命之學留意禪悅胸次蕩然丁卯舉於鄉居小寒山讀書山寺寒暑不輟因號寒山子喜與方外游頗類盱江之黃海岸名端伯初海岸為寧波司李亷靜恬退久參洞宗常延緇流入公署寒山偶以公事往謁諛椒及濟洞上溯曹溪機鋒各出語至移日不復言所事而去後海岸改補杭州司李丙子分考得一卷奇之秉燭朗誦至夜分聲徹户外鄰房傳以為笑評其文云此士之特立救正時弊者及拆卷則陳子玄倩初名朱明卷也玄倩亦頗自負讀書舉大略好任俠常以身許人與同座有不合大義輒叱去當南浙無事時曾擕所知往紫陽庵坐石飲太息曰吾安得死所如史策烈名字動人耳目者同坐私怪之會漳浦黃石齊言事戍浙講學大滌山中杭紳陸鯤庭培負文望謁石齊乞為先人志墓才通刺玄倩以陸子初不與東林之席笑曰石齊先生座豈有鯤庭履跡哉復微詞其父石齊由是以疾辭未之見培聞之怒壬午秋登樓社中友有得雋者玄倩輒譏切其闈牘培固登樓社中人也益怒偕其黨檄攻玄倩抗士多忌玄倩羣攘臂起海昌范白朱近修諸子咸應之獨東山輿沈聞大倡言曰陳子持大誼吾黨蓋友其於父母昆弟孝友切劘多有可稱者安得以一人私仇震驚闔郡乎木中陳子木恂曰吾固審玄倩素館留玄倩及其家屬於是陳與陸雨社賔客子弟各數十百人列舟為陳口鬨於禾之東門積三日觀者數千人主倩與鯤庭固未嘗知之也癸未玄倩入都不應禮部試徑就選選君中以危地授開封府推官開封被賊決河巳陷沒玄倩駐守旁邑逼寇甚飛疏云河南尚有可國之勢河北實多纍卵之危擬請重兵守覃懷遏賊未報而京師陷因與西平將軍劉洪起共事擒賊僞官五人上捷南都復諸郡縣以功擢御史巡按河南奸輔馬士英勇除不附己者玄倩言事率多忤復與廣昌伯劉良佐合疏護皇妃童民入都上方窮選蘇抗殊色不復念舊士英等迎上意曰此妖婦也命逮潜夫乙酉五月上棄南都潜夫出獄間行還浙當是時寒山忤上官失職歸里踰年矣閣部史可法表函輝監軍河南道與潜夫撫輯河南北函輝辭不就值魯主避難於台遣使就問而北檄已至寒山蹈水者一投繯者三以家人伺救不得遂巳而魯主監國紹興函輝與總兵吳台伯有扈從勞㩴左春坊進詹事府少詹學士奉諭聯絡溫處而潜夫亦渡海率所募家丁入覲命以原官治軍加太僕寺少卿監軍小亹側聞陸培仗義自殺歎曰鯤庭顧能為此並疏浙西死義十人列培名於首請加恤論者稱玄倩不以初怨沒鯤庭之節云丙戌二月命與方國安合守嚴州恐餉不給謀運米於溫台取道於海而寒山將至溫便道還家與僧湛明約圖結茅雲峰無志任事監國敦促晉禮部侍郎竟不就潜赴雲峰以處士衣冠習方外威儀晨昏課誦如素所熟習者五月方師潰於桐廬士卒棄營東走玄倩急還小赭欲保會稽而監國駕遷將及台矣或勸玄倩且肥遁笑不答乃設奠祭先公存之先生出繼母拜堂下以書屬其弟令妻妾互縫其身衣蓋妻妾兄弟孟氏也小孟有娠八月矣伊父完初在旁欲生之玄倩不許大孟素知君子必殉國願從死至是欣然與偕黃昏至化龍橋是為五月之晦戍天與水昏黑忽水光一道如電可十餘丈二孟從水光相擕入水玄倩大笑曰孟完初乃有此二女哉舉身赴之年三十有七子南篁甫十齡得無恙六月北師入台來嘗按籍追求荒遁湛明對寒山云雲峰片地公可終老寒山瞪目視之自書年譜末云徐陵五頭唯誓出家文山七歌尚思殺賊輝得其死所矣遂領作埋骨記始二子目謙巽之令家人從僧索故曆日六月之望可了作詩文如常望前一日晚課畢急竄入方池水淺不得死僧競持起挾入卧所頃之闔户引繯盡年五十有七有致命詩十章録其二曰慧業降生文人此去不留一字只將子孝臣忠貽與世間同志乎著遺文千頁尚留副在名山正學禁書亦出所南心史難刪湛明為治其後事前此乙酉五月海岸已致命南都别有傳浙語六東山散筆墨庵補述沈乘吕宣忠王育蓍潘集周卜年嚴于鏻潘國緒葉尚髙朱奇生鄒維則楊守程卞子厚沈寶埰徐睿范晉谷王翊龎元培傳曰浙之士十有五人有倡言名義辭出於口即見殺者為沈乘義勸其師劉念臺而以身先汨羅游者為王育蓍感慕育蓍柳穚之義操文泣祭相從於水中者為潘集感集之祭育蓍大聲讀其文於水次決志赴海者為周卜年興育蓍同學交善而恥育蓍之獨為義者為嚴于鏻恣為大言震駭敵聽招挺刃以自見者為潘國緒有杜門月久不與時事江干震動渺不相聞及大軍至浙東故以儒冠博帶傲於郡守之前甘心自盡者為葉尚髙有久居山中跡者不至東浙巳下忽挾公服而出自沉於河者為朱奇生口不傍名義身不列戎行混跡流俗隨衆出迎大帥忽聳身蹈海者為鄒維則以完髮見收責令剃髮而寧輿頭俱去者為楊守程以全髮縶獄不食死者為卞子厚往來上下江出入敵壨因友罹難不忍獨生者為沈宗埰其奮槊起事戮力戎行不移其志者則為吕宣忠為徐􅐶為王翊而最先見殺者為仁和之沈乘夫乘何以死也乙酉初夏南都失守潞王在武林總兵陳弘範勸王北降以保百姓百姓喜謂王愛我無使我百姓盡首膏北刃也時羣議公庭乘獨之言誰主降議議降者不忠當斬今大帥方國安率所部鋭師自東北來閩帥鄭鴻逵以其衆還閩尚未離浙以王命臨之可檄而至也吾五營重兵皆東陽義烏之産頗能戰自越及閩西接豫章兩廣雲貴猶吾故物奈何廢大義輒俯首偷生乎請急空武林門外宿諸師急發一旅扼崇德水陸兩路合崇德城守之士以壯軍容內保堅城徐俟外援西聯婺北合苕霅會師於禾城中興之業在此一舉百姓猝聞之以為諸生撓國法貽禍一郡鬨起數百衆立攢殺之分其尸骨盡及閩六月之十三日各路兵起遂有悔殺沈乘者初乘欲扼崇德水陸諸路收合其城守之士俄而崇德之吕宣忠倡義以應魯時魯王監國紹興宣忠由間道渡江謁王曰臣本書生臣年二十有二臣月食粟五升臣力能搏多人臣學頗知通變臣有死黨數百人臣能為內應於浙西惟大師速濟監國動色即日署總兵都督僉事復進言曰北師恃馬我多步卒易見短莫若用水師以勝之浙直相接左右多水鄉北騎從塘上來我於叢密處出其不意猝以舟師進前縛芻為人以誘致其箭箭易盡我用鳥鎗以炮其馬馬踣人盡墮水足以奪其鋭氣預聯太湖之師擾其後我擊其前則嘉禾不受兵而蘇松皆可圖也王甚然之適前兵部吳易駐師太湖特疏宣忠可共事加扶義將軍還部其衆應援太湖丙戌三月大戰瀾漢三日夜不解甲各較失利宣忠所部獨全五月魯敗宣忠見根本已喪不可為棄其衆削髮為緇流入山時吳易被執連宣忠坐獄有丐服從島中來者行全獄吏得入謁宣忠行屬禮甚恭宣忠驚扶起曰此何地立死矣丐服曰下吏奉命至此凛將軍威嚴不然䙝朝廷且廢將軍法宣忠在患難使人不敢玩如此急令之出未幾與吳易等五人同日就刑五人面死灰脅雨持尚不能進宣忠獨昻首前導怡然不改顔色忽見丐服者復在旁語之曰我有古劍在某處我死汝取以殉葬遂死丐服者果如言收葬之宣忠所遺託志詩有曰春風如有權一夜緑青草長歌有曰倒江拔海自天下爾勢傾動無堅城茅簷寒士春凍死桃李涕泣愁飛鶯日月黯墨不可得大地流泛誰為撐又曰天地反覆機事深閉户之外無山林誰能逺遊及春水斤言慰我蒼茫心後丐服不知所終宣忠既以古劍殉葬復有佩劍生徐睿無事常佩劍負才慷慨工詩習為大小篆偶佩劍走貴人座目攝貴人貴人為色沮甲申之變睿聞悲憤盡削其髮焚儒冠披僧衣埋故所佩劍以鐵鎔户鍵拳膝文室中令家人破穴以進食無何武林北降有言員外希聲錢肅樂起義者聲聞文室中睿大呼其須出關破穴出手裂鍵鍵斷掘故所埋劍楚僧衣裹甲約所知突起為一旅江上相持輒小勝欲糾各營西渡無有應遂孤軍渡江仗劍冒敵敵故避其鋒隂以水師截其江口睿竟深入再戰敵衝以鐡騎睿步卒亂欲還江口阻睿擲劍於地為敵所執歎曰吾劍術不精應死久之其家人以􅐶所篆復明二字石章鬻於范香谷香谷為之記寶藏之香谷名兆芝諸生嘗與同學陸字燝密護大學士張肯堂之孫滋大意不得客死巳而睿之餘卒有逃歸者投閣部熊汝霖軍中熊有贊畫王翊故餘姚縣吏也聞睿棄劍殘大慟曰志士固不當如是耶吾篋中圖章睿所篆也對此何以偷生急欲西渡熊力止之初翊在軍中監國授以文銜改兵部職方司郎中贊汝霖軍事時諸營各自為力翊勸熊聯合之俾彼此相應及紹興不終翊遁入四明山中部數千人日董練以作其氣私掠居民者殺無赦而夜讀書省大義以故諸借名倔强山中者皆殘而翊獨以仁義士爭向往之逺近相餉不竭戰頗捷四明郡邑郭外無不裹明制以奉翊監國在舟山遙授兵部尚書兼右僉都御史取數附邑蓋擾紹興者五年舟山亦恃此以為固率卯六月大軍北來將與翊戰山中不能守走保奉化誤入伏虜去是夜有大星隕海聲如雷翊從容索輿入城有三門者從翊麾之不肯去詣海道公堂踞上座海道以翊慷慨禮接之時一足失襪帶門者跪而上襪襪已雄自顧眄自稱本部院不能恢復中原理宜死時聞其弟某與故幕蔣生别𬒳執不屈死曰誠不愧為吾弟將刑訊官諭三門者不預冊可脫去三門願同死遂並刑翊顧三明者曰莫心亂心不亂為神次亦為厲可以殺仇讎心亂便鬼矣立而就殺頭既落猶兀𥪡移時久乃仆懸之西門有江虬龍者僞作北師裝夜嘨城上密取翊首聯尸營葬為文以祭之虬龍故奉化諸生也祭文失傳自王育蓍以書上劉念臺先生為完節師弟遂投抑橋死潘集為文哭告亦僅傳其略曰旻天不弔所賴忠臣骨作山陵壯士何為徒令儒生怒經溝瀆惟吾王子立身不二始信秀才如處女斷不更夫才知名下無虛士今為定論潘集願分驥尾點書同誓契丹不愧效嚬扶目共觀吳治云云越日詣故人索飲飲酣袖出育蓍憤時致命篇讀之曰羣奸誤國廟社淪胥儻月前尚可偷生知他日必貽後悔古稱五死何似捐軀赴義之可樂夀止百年保無疾病水火之殺人鬼如不厲為訪三閭之踪魂果有靈當遂伍胥之怒讀至再三復言死不去口或曰甚大江南死者寥寥公書生徒勞苦無知者集作色曰巳許玄趾不知其他六月二十有六日徒步出郭䄂二重石自沈渡東橋下年三十有八友劉越生起其尸遍計同人恤其喪陪位王玄趾於學宫以䄂中二重石作供而受國人之弔若仁和諸生沈宗埰於乙酉十一月禺護髮丐服竊渡江歷北師乘障者六以詭辨得脫監國授兵部司務奉命復丐服還浙西密聯絡諸旅躬詣鄉勇龎元培使再起弄兵山澤間及事敗元培被執宗埰聞之曰龎君吾所强安得令獨死遂出自投獄死山隂周卜年感慕王育蓍之義不别妻室浩歌而之海上卒道晤所識豎子出一緘授之曰有跡周定夫出此緘監子許諾則見卜年疾馳向海磯立方潮起風潮相激宕卜年踴身入潮苦赴敵者家人聞之號其處得豎子所存緘蓋以後事屬其弟也越三日妻哭其死處忽有物乘潮來即之卜年尸也乃克歸葬論曰聞完動翊之言信乎鬼不如厲厲不如神抑神不如星嗟星入地而石矣安足貴若子翔集袖中二石聖思睿所篆之石固自足貴為人寶藏也至亮二宣忠之古劍而殉埋聖思之埋劍而出試夫劍固通神今不能神安知他日之劍不神光燭天也哉孚中乘為內所殺諸公為外所殺幼文宗埰可以無死而義不可以負龎生惟玄趾自沉感動者衆定夫周卜年陟明嚴于鏻復繼子翔以報玄趾而鄒維則之蹈海朱奇生之入河與玄趾柳橋之義蓋約略相同大義所存生死不亂殆其然歟夫以諸公之奇才獨行而文不盡傳獨子翔玄趾偶以文傳玄趾之文又因子翔口中而傳以中孚之詞出口見殺而詞益傳夫固能自傳之也浙語七查東山筆沈墨庵閲陸培王道焜王均陸圻陸培號鯤庭浙仁和人父運昌崇禎甲戌進士鯤庭少年好淹博務為奇麗之文不務工時目時目不甚解則聲和曰良越俗率以奇麗得雋己卯庚辰屬雨榜盛名壬午丁外艱以行人家居同里孝亷陳潜夫為東林諸公所推重培不甚往還潜夫故抑之培家積怨為檄攻潜夫潜夫常以口舌負怨於里中故翕然從陸而鬬陳之倫輩若敵然乙酉六月潞藩北行培以其家避黃山時錢塘知縣顧咸建以不屈見殺北貝勒令益嚴逼諸紳投謁五日不至者兵及其門及培培不應貝勒怒曰培必不出吾發培先人塜培賦致命詩有雍國尚慙收采石荆胥無計乞秦兵之句入拜辭其母走地所潜自縊死遺言囑陳尸通衢以絶後之跡培者且無入山中驚吾毋同時舊紳錢唐兵部主事王道焜亦同子均避武康山中均壬午孝亷也時新填邑令皆明榜鄉舉共十七人且須均責就選吏入山傳檄道焜欣然擕其子均入城謝使者曰道焜老病且死無所用必欲見道焜輿櫬來也使者疑為戲語不深信明日復至登其堂則道焜方包殺尸橫地熱血噴流未盡使者驚愕去以狀還報因不深求均均得終喪隱居山中不復出甲午浙之督學張安茂崇祀道焜於鄉賢而前十七人臨安令陶良棟等皆為其治之舞兵者所殺初道焜少時為王慕樓蔡虛齊兩督學所賞精書法詩自為家其後過鄱陽湖風濤大作夢龍神乞句為詩投水指水曰吾詩一字一珠汝領恐不足埒我頃之風濤頓息亦一奇也按鯤庭世官鼎族門庭清肅居家儉約昆弟自相師友兄圻字麗京亦負異材選拔明經乙酉感鯤庭之變棄而業醫久之坐南潯史案冒入名於書端與余同難踰年得白棄家入粵度為僧不返舟山前語沈墨庵補述下同吳鍾巒錢肅樂李向中朱永佑董志寧沈宸荃華夏吳裔之佑之福之王瀚王淳王湛王之仁戴少峰賣菜倅舟山在大海中與普陀並峙隸浙之寧波廣可千里築城其間約十餘里中多渟泉可以蓄衆附城多膏腴沃野可以宿飽前代常設衛備禦海冦元末民與冦通樂為嚮導我太祖既招降方民海不揚波乃遣信國公湯和相視海道練兵舟山海冦以寧既而民利於冦不時竊發乃盡遷居民入內地舟山遂空久之居民業海者復稍稍聚我明盛時倣古制亦設衛鎮撫雞鳴狗吠烟火相望間生文人始建文廟立鄉校有內地風乙酉六月諸生鄭遵謙刑部郎錢肅樂奉魯主監國紹興武臣黃斌卿張名振先後屯聚及紹興敗魯監國泛海駐蹕此山一時諸臣相從舟山者頗多而吳錢等七君子為最著寧國公王之仁走死南都為最奇嗟乎扈海為求一死地豈真幸一日冦帶水濵哉余感七君子其心同而事跡各見若鄞之諸生董志寧聞武林不守號哭文廟時邑紳競商所以迓北師者課牛酒不等㑹議演武場惟錢肅樂獨不署名志寧感其義就肅樂共起一市傭戴少峰者願附志寧之義大書恢復二字於額鳴金衢巷至日中已合數千人又賣菜倅願上一金助餉視之皆碎末千計不啻也志寧髙懸此金為勸遂從肅樂迎魯藩至紹興稱監國元年招定海總兵王之仁共守江口魯主晉肅樂太僕少卿不受加都察院右僉都御史不受又以江守功進副都復不受仍以刑部郎巡視江上朝夕勤動以振作士氣踰年事敗監國航海肅樂就總兵張名振保石浦當是時志寧已授兵部主事統其所合數千人戮力江干五月事變志寧入鄞山中輿舟山相為聲援會嶺西道吳鍾巒聞唐主改元於閩棄官歸丰道别妻子密赴閩中值延平失守鍾巒隱於閩之城頭鄉鍾巒字稚山初知長興縣丙子浙閳分考得錢肅樂卷稱為國士希聲亦嚴事之方在石浦唐主遣使禮聘希聲甫入閩界而唐主失國因踉蹌棲海壇山苦飢內地有義希聲者潜粟活之來幾建國公鄭彩以義迎監國於鷺門旋台肅樂晉大司馬東閣大學士共復建寧及福州所屬八邑建寧之捷即鄭國公王祁奮起之師也事見祁傳希聲因疏薦稚山苦節監國乃召鍾巒丁亥拜通政使進禮刑二部尚書嘗與希聲誓此日髙尚恬退俱非所宜言只有尋乾淨一片地權放此七尺軀聽天為之耳其所與共間關風雨困厄崎嶇數年不忍去者則故長興枉獄中所脫死四也方建國彩圍困福州劉中藻奮起小福稱新鋭鄖國祁北指仙霞扼敵援聲勢頗雄志寧在山中聞之率諸生華夏等六人惜失其名密走舟山約島兵入則共起應之有鄉老謝三賔者倡言牛酒北迎以志寧舉義不得邀北寵遂與志寧等郗僞為其所昵故入華夏所伺變夏不疑令以六人檄馳約王完勳山中至期總諸部合應伺變者直以所檄呈露北營居告逆功十二月之二日肅虜伯黃斌卿果以百舟蕩壯士數千斬招實直抵寧波郡城下桃花渡而先一日首事諸人巳被縛諸應兵來山中者皆逆拒島兵俟間而起久無所動乃疾乘潮返志寧微聞夏被縛痛大事就廢猝棄妻子間走舟山以圖後舉華夏字吉甫定海諸生時逮訊責黨夏曰事自夏無他知秀才做事十年無成但起義美名不甘讓與他人請殺夏足矣訊者義夏欲釋之夏大言曰即不見殺夏自不欲生移訊問主使曰太祖髙皇帝主使問黨何人曰黨多人請給筆札自填因盡録倪史金黃諸先死事數十人墨乾乃止巳痛罵同鄉謝三實不巳與同事屠獻宸並就法意屠其六人中之一乎北營由是重華屠而益輕謝云華屠致命時閩事中變建國彩忌鄖國功髙撤圍去諸郡邑皆棄復擅殺閣部熊汝霖衆心始離希聲浩歎曰敵同舟矣積憤成膈中有物如鐡遂不食北望歎曰安得我破膈時移居琅琦山監國使錦衣視疾肅樂但流涕叩謝不能盡其辭病中聞某處失守則以頭撞牀欲碎易簀時遺命以先帝所授員外禮殮戊子五月肅樂卒有弟肅範從唐兵部尚書劉中藻起事小福州中藻别有傳擊敗北師復夀寧後從中藻戰死時吳稚山扈蹕鷺門得希聲凶問大慟曰我棄妻子如脫屣視門人為骨肉骨肉永廢吾何望哉適松江朱永佑又玄浙東沈宸荃皆由閩泛海覲監國於鷺門永佑與宸荃交最善汩沒波濤者數年而與稚山同捷南宫常訪稚山於城頭鄉謀所以善死之法及椎山赴鷺門朱沈繼至稚山私念失一門人猶幸得良友與朱沈相誓從草莽中益嚴君臣之禮用攝武臣之桀鶩故流離播遷中體統自尊及建國彩棄主擁衆走三沙已丑秋七月定西伯張名振扈駕就張煌言於台之臨門八月監國入舟山諸臣從之既而原職方李向中亦至向中字立齊楚人庚辰進士初知長興向為稚山舊治立齊英偉傑出不依回流俗其蒞長興獨倣稚山遺法而能決數年疑獄民咸以為神至是始識稚山以稚山善治長興故遂師事稚山余觀椎山守身勞瘁非有奇謀殊績傾動中外而諸君子咸降心以相從者以守身之學能知大體書曰守身為大易家人之大象亦曰君子以言有物而行有恆世治以養和平世亂以擊人心者也監國擢向中兵部尚書宸荃晉東閣大學士永佑吏部左侍郎庚寅閣部宸荃為同官李長祥所嫉憤悒棄官引匿吳朱留之不得隱於舟山之僻而中以艱在內地越險不能奔持喪服廬於山曲不視事率卯八月一日監國詣蛟門祭江鍾巒侍從永佑居守兵科給事中董志寧率水艍前導夜半見有大星從西北隕舟山小星隨之隕者無數監國即日還中道聞北師逼山御舟不敢近陸間道走金門鍾巒獨興志寧奮厲入城城中志士頗多同心北師攻之環圍十畫夜南北失援鍾巒聞而歎恨輒不食志寧巡城飛矢受傷終不肯退鍾巒見事急預持禪院中萬歲牌端設於學宫之尊經閣中右廡陳髙座積薪與座等九月之朔城破向萬歲牌行五拜三叩頭禮畢自持火登髙座即發大自焚自稚山以十願名齊其十終以見危授命此日自以為不負所願云前所脫死犯藁葬稚山於山僻其後幼子裔之越海訪得所脫犯擕骸費與之偕歸三子福之先從太湖義奮戰敗死兵科給事中董志寧亦自縊文廟與右廡密近稚山之火延及遺尸并盡於火尚書李向中侍郎朱永佑𬒳執不屈死又玄出語痛詈故受戮益慘焉大學士沈宸荃巳掛冠郊外潜泛海將歸遇颶風覆舟死初監國航海叛將張國柱劫魯宫眷北降寧國公王之仁向積功江上聞之憤悶詣舟山欲以義激黃斌卿討叛斌卿請以舟師共擊國柱輒反兵內劫之仁不備之仁棄數十艘盡沈其眷屬語二子鳴謙宣佐曰死此無知之者登漴闕募肩輿往見北土督督勸之降請剃髮寧國佯曰俟一訣內院洪子南都承疇既見洪方拱禮降階寧國即咄曰忘國大恩偷生俘虜有何面目復見中原士大夫乎洪怒甚立殺之遂以冠帶及難此豫所謂死最奇者也寧國志在舟山惜不及連舟山而必以舟山屬之若婁東諸生王瀚及其弟淳湛皆希聲治太倉時所得士乙酉淳湛起兵太倉陳殁瀚於甲申冬為文告宣廟去華山為僧希聲方家居作書與誓曰台兄忠孝兩全即此已是正果獨不肖奉養未終生不成生死不成死抱恨無窮敢於台兄前發一誓願必尋一死所以報知己蓋早已致命為期矣墨子因瀚得見希聲乎書希聲以舟山為死所故王瀚原無與於舟山而亦得列於舟山瀚為僧名戒顯號晦山論曰語舟山者先書地後書人與十五國之語絶殊昌故哉凡十五國皆中土版圖故先書人舟山雖附四明而孤懸海外非郡非縣丁口不登於邑賦稅不貢於朝則又不與瓊崖同例而諸君子所以扈魯者且七年勿懈所恃惟此山耳故先書地地詳而人始詳詳地必及文廟題先列稚山事先序幼安志寧字兩公皆致命於文廟有以也而語中不及土著文人抑有遺語乎曰有舟山後語在舟山後語張肯堂董玄曾應選顧玢江中記陳所學朱養時梁隆吉林之瑛劉午陽阮進張名振張名揚杜伯起張瑞初王朝先劉孔昭徐孚逺阮駿江天保黃斌卿陳九徵李思密鄭遵儉周崔之周瑞王衡楊璣孫延齡黃甲李國禎楊鼎臣李開國李向榮焦文玉劉世勳馬泰單登雲蘇兆人黃忠孝顧明復陳六御姚志卓劉永錫楊晉爵郭貞一義英標官羅若騰沈荃期紀日青林復齊僧無凡王妃張氏宫春十三人一內監繄聞之錢希聲未蹕鷺門吳稚山尚棲閩表而大學士張肯堂霓淵已奉唐主命入舟山監肅虜伯黃斌卿軍協力北拒初中書舍人謝龍震辱唐使劉中藻於廷及紹興敗斌卿出不意劫魯寧國公王之仁修唐隙也當霓淵之在福京也見同官黃道周素與鄭氏不協疏劾芝龍言官附之以攻鄭為能霓淵難之曰今立國伊始須有權宜以備緩急鄭即傲頗好名昌姑與共事且兵勢全屬鄭非兼仁與義通常與變無以服鄭不然急以至誠動之賴其一試時唐嚮用漳浦而大司徒何楷復勇咈鄭霓淵由是與同朝不協請監斌卿之師於舟山未幾芝龍潜撤仙霞諸守禦北師遂入關而蛻淵之籌鄭始驗己丑八月定西伯張名振護魯主達舟山斌鄉不即納將軍王朝先及蕩胡伯阮進等欲以兵劫之監國不許諭進斌卿為侯方開諭斌卿伏聽朝先率甲士猝殺斌卿於是舟山諸旅盡為名振所統衆共推重霓淵監國仍以張肯堂為東閣大學士加宫保晉蕩胡侯朝先平西伯諸文武晉爵有差以王衡楊璣為欽天監丞衡璣向從事五官保章頗請曆數造大統曆成仲冬至日頒監國五年曆於廷臣文臣肯堂武臣名振率群臣行朝賀禮舟山在籍諸生顧玢江中玘陳所學通經術持大義捐私財以資公用疏請開屯為持久計略曰臣聞在昔漢趙充國以屯曰事先零諸羌其事平易無奇而獲效甚大嗣後有志大業者往往因之我太祖草創即命康茂才為屯田使軍需以饒及天下既定命遼左秦晉昕在屯種中都廬鳳亦開屯荒田前代開屯重在西北太祖并行於東南此之安長治之要圖也舟山舊設軍衛前此居民遷徙雖令軍士屯種而軍儲接濟咸仰給浙東今大駕駐蹕不議開屯軍餉空虛征取民間則閭左愁怨徴饋夷島則小國輕心咨謀思明則圖給目前隂糴浙西則得失難定臣生長舟山頗知生性髙原藝我泰稷夏熟以俟秋成流泉溉兹禾苗冬藏以供春種大王志在中興逑輿大臣商榷應時􅛮荒更番率作軍民不擾生息日開以大王之靈因天之時盡地之利人心和輯然後觀釁而動動無不成惟大王裁擇監國然之命將軍張名楊為屯曰都督以諸生可大用欲㩴置臺諌顧玢等復疏辭曰臣等海澨書生革茅下士愧無他長以資效用惟是讀古人書學聖賢事瀝誠戴國不因貴賤殊情致身許人不以盛衰改節今當輦轂之下少瞻龍衮之光群情擁護里拱北辰一時士風日臨南向將開貢院採擇名材臣等願赴兩試之期以志觀光之典疏奏乃授中書舍人許應闈試五年庾寅春正月望祭命監丞衡璣􅓪日以侍郎朱永佑祭山太僕少卿李思密為副侍郎張煌言祭海通政司麥議鄭遵儉為副仲春中書舍人玢中汜所學復請於上丁謁文廟行釋菜禮乃命禮部尚書吳鍾巒出宿齊宫禮部主事董玄蒞事國子監祭酒律孚遠學録曾應選習儀太常卿陳九徴典簿黃甲陳鹵簿御史朱養時梁隆吉清道兵科給事中董志寧扈從兵部郎中李國禎主事劉午陽警蹕定西侯名振蕩胡侫進陪乘尹部主事林之瑛備物中書舍人玢省牲中汜省器所學贊禮部主事楊鼎臣李開國為相大學士肯堂上尊義英將軍阮駿衛後禮成監國御眀倫堂祭酒學逺進講秦風無衣之詩而還至三月十九日命設壇祭告先帝禮部侍郎孫延齡讀祝文主伏地哭興陪祭文武皆哭聲振山海祭畢延齡頒胙閣臣肯堂哭語延齡曰某掌河南道時曾受胙於京師安能忘十七年宵旰苦心也時鄭彩佯扈國主恣睢桀驁方在鷺門幾犯蹕竟棄主不顧走三沙擁衆自雄蕩胡進心憤與衆議曰彩為不道擅殺勳舊鄭義興熊閣部之冤憤不伸則諸廷臣衆部曲之志氣不奮請為公等先驅于是定西名振檄平夷侯周崔之閩安侯周瑞皆以兵應攻彩於三沙敗之獲其艅艎盡彩竄走粵洋自保嗣後海起怒濤俄見書袍銀甲擁旌斾乘濤而來即之則義興伯也彩狂呼叩香謝罪義興俄以戈擊之暴卒事聞舉朝義之卒卯秋北師大治戰艦從蛟門向舟山適禆將江天保為蕩胡進先鋒以四水艍迎學定海路獲勝沉其十三舟進引軍復邀截之俘其將不殺率斷右臂縱還舟山武功於兹為烈嗚呼人事盡矣天道殊不然八月既望群小星從大星隕城中定西名振以國主由外洋南泛越日北師三道攻舟山其出吳淞及閩洋者我師分禦皆捷時舟山精鋭分應南北洋踰五日定海關復大出師俄黑霧起迷山麓城中不及覺南北洋二道凱師次十八門為北軍所阻不能入援惟蕩胡進從蛟門激大艍壓之幾捷復為黑風漂沒黑霧隨風而起我艍不前反為敵所乘進乃乎發火桶倉猝桶觸桅火焚我艍進急躍水敵舉鈎矛起進進創甚不能言瞪目怒視三日死此月之二十有一日也進既死北師登麓急圍城時屯田都督張名揚守南門閣部張肯堂守北門監軍主事立元吉金允彥督三親標協助南北錦衣衛都督李向榮左軍都督焦文玉守東門總兵馬泰副總兵單登雲守西門北師攻圍不遺力守者亦百計應之敵逼城下垜雉矢石交下重傷者頗衆敵飛炮城堞數崩輒隨破隨補環困十畫夜監軍允彥力窮潜叛內降為言城中盧實且言元吉在南門將內應導攻具益進守者猶醢允彥子傳示四門以示不二九月之一日南門開舟山城始陷東門都督李向榮焦文玉巷戰西門馬泰單登雲亦率民兵戰城中擊殺百餘敵益進皆力盡而死中書舍人顧玢見城破偕江中汜陳所學皆闔門自焚國主繼妃張氏赴井死宫眷十三人從之一內監扼死井旁以殉敵以兩王子北去大學士肯堂屯田都督名揚一門死之其相繼死者為李向中朱永佑朱養時梁隆吉林之瑛劉午陽有駐兵城外者為李國禎以母在城間冒險入𬒳執死董玄曽應選杜伯起張瑞初顧明復咸自縊於學宫而與稚山幼安同時致命於此孔子於儒行有曰劫之以衆沮之以兵見死不更其守其特立有如此者可殺而不可辱其剛毅有如此者由是觀之諸君子其何負於學宫者哉舟山敗後都督劉世勳與楊鼎臣李開國猶死守安洋北帥移師攻之安洋孤絶無援世勳身被數創格鬬不退與楊李同日死方八月之晦霓淵門人蘇兆人知不可為已投繯盡霓淵有僕巳度為僧法名無凡鉢於普陀聞變歎曰吾翁其殉國矣促航舟山泣請北帥願下主懸藁葬於土帥義而許之時定西名振以國主南泛孫延齡徐孚遠等皆從扈金門供億常匱各勳舊黃忠孝郭貞一盧若騰沈荃期紀日青林復齊與孚遠間從內地密輸以佐軍需定西名振亦隂遣使入江楚佯為賈客儲粟金山及鹽官等處復以己意乞師厦門國姓成功與定西盟出師二萬偕尚書煌言義英駿誠意伯劉孔昭等直溯金塘獲前叛金允彥磔之以祭舟山諸死事者旋登金山泛儲粟而歸甲午定西復入京口國姓亦遣將陳六御等協力抵平洋沙攻崇明不克將軍姚志卓失利自剄還觸吳淞關掠北戰船二百七十號定西更以沙船九百泛登萊還窺吳淞復移師攻舟山大捷北督以城降寧波北鎮張洪德潜使人通海以百餘艘赴舟山名振乃祭告山海及祭死事諸君子冬十二月名振病卒於舟山司馬六御義英駿代領其衆遣使告喪於金門監國十一年丙申二月三日舟山城夜哭歷五日始息南門偶發一碑為國初信國公湯和所建碑文若知有今日事者秋八月北師大集攻舟山陳六御阮駿率張洪德分應要害駿之標官失名最徑捷從檣首飛渡敵舟猝斷蓬索敵篷墮橫壓數舟敵勢甚沮溺甚衆相持久駿舟忽膠淺不能馳驟敵圍困敗死六御洪德合兵來援風不利被創並自剄死將軍劉永錫孔昭子躍水死將軍楊晉爵截橫水洋力竭亦剄死太常卿陳九徴被執不屈死餘不知所終於是舟山再失論者舟山勝勢莫大於辛卯之八月執訊於泮宫獻俘於王廷足以伸志士之氣頌曰在泮獻囚在泮獻馘乃於今見之其後盡節學宫歷歷可見於學宫為有光也哉余感舟山初失皆以守死再失皆以戰死能與讎戰雖敗猶榮傳云內以諱為貶以不諱為善敢自附於春秋之書法法從乎同故於後語見之臨門語查東山散紀沈墨庵補述張煌言大司馬蒼水先生名煌言字玄箸鄞縣人崇禎壬午登賢書英年傑出已負大志遭國變乙酉越諸生鄭遵謙舉義奉魯王監國于紹興煌言仗劍從之以庶常權制誥北師不即東渡相持者一年丙戌越敗扈蹕海上歷十九年初加兵部侍郎進尚書加東閣大學士其自序北征紀略云煌言嵗自丁亥持節監定西伯張名振軍應松江吳勝兆之義遭颶風覆舟陷敵中七日間歸仍扈舟山嗣後三入長江登金山掠瓜儀而師徒單弱迄無成績歸破敵於舟山復取之時粵擁桂藩為永曆十年丙申舟山復棄乃入海在諸洋中鄭國姓屯厦門稱思明州壁大兵外四屯監國駐金門陳文建屯玉環山阮春雷屯楚山而余屯臨門諸帥會師必至焉永曆已封國姓為延平王戊戌隨延平北伐抵羊山復遇風碎舟返斾己亥延平全軍北指以余練習江上形勢推余前驅抵崇明既濟江議首取瓜步時敵於金焦間以鐵索橫江夾岸置火器欲遏我師余領一軍先入諸艘鱗次且進且却兩岸炮發飛彈如雨諸艘被傷思退余所轄十三舟麾之徑進同䑸數百艘得入者僅十七舟進據金山金山守者咸遁盡收其餉以犒軍軍士皆踴躍效命翼日延平師始泊瓜城一鼓而殱滿漢諸軍殆盡乘勢克其城余謂潤州實長江門户若不先下則敵舟出沒主客之勢懸殊甚為無算而延平猶慮留郡援騎來可猝禦余曰若遣舟師先搗觀音門則留都震動彼自守且不暇何睱分援他郡延早意悟即屬余以水師往且以直達蕪湖為約時六月史暑余奮不顧身遂流而上舍海舟易沙船牽挽直前未至五十里吏民賚版圖迎王師遮道來歸既抵儀真一夕延平已遣李將軍單舸往撫子登江濵公署慰諭士庶遂發舟西上遺民無不具瓣香相迎濵江小艇載果蓏咸來貿易余顧而樂之市者不止行者不變三代王師氣象不意於今日見之舟次六合得報藩師巳於六月下旬取潤州豫計􅽋州即下藩師由陸遂北可即達石頭城余故兼程而進抵觀音門不意藩師竟從水道來海艦不利江行以致金陵得嚴為之傋余艤棹觀音門所統戰艦以風沮愆期未至乃發輕舟數十先達蕪湖而舟為殿泊浦口七月朔敵偵我大䑸尚逺遂發水艍百餘載徑卒侵晨出上新河順流而下余左右不滿十舟且風逆戰不利幾困忽聊舸至則余轄下犂􅙔也余遽乘之復戰後舸續至夾擊敵大潰遁去詰旦整師前進匿不復出余部曲馳報江浦巳破蓋余方與接戰先一哨越浦口旁掠止七卒傅江城城中騎百餘開北門遁而七卒遂由南城入亦奇矣哉當是時延平亦抵七里洲余往輿大軍會正商略攻取建康而余所遣先往燕湖諸將蕪城巳降矣爾時上流聲靈丕振而蕪湖為上游門户可以控扼江楚余因辭延平乘所轄戈船以行而幕府之謀不復與聞矣屆七夕抵蕪城傳檄諸郡邑江之南北相率來歸郡則太平寧國池徽縣則當塗蕪湖瀪昌宜城寧國南陵太平旌德貴池銅陵東流建德青陽石埭巢縣含山舒城廬江髙淳溧水建平州則無為廣德以及河陽所得城共三十有一先是余之按蕪也兵不滿千惟以先聲相號召大義為感孚所遇城邑墟落秋毫無所犯有游兵闌入剽掠者即治以法以故逺邇壷漿恐後即江楚魯䘙豪雄多詣軍門受約束禡旗相應將部署諸軍為進取九江之計然延平圍留都巳半月初不發一矢射城中而鎮守潤州將帥亦來嘗出師取旁邑如句容丹陽實南畿咽喉地尚未扼塞故蘇松援兵得長驅集石頭余聞急上書延平告以方略不意師勝將驕日事髙㑹樵牧四出營壘為空敵諜知用輕騎襲破前屯延平倉猝移壘質明軍竈未就㪣傾城出戰我師無鬬志竟敗績時余在寧國受降留都報至遽返蕪湖則七月晦日也初意石頭師挫來必遽登舟即登舟來必楊帆徑去矣故彈壓上流不少動敵將郎哈等遺書相招余峻詞答之太平守將叛降於余即遣師復取太平生擒叛將誅之時下流既退敵始專意上流截余歸路各營將士始稍稍色變然刁斗猶整肅如故余欲據城邑與格鬬調池州守兵未集忽諜報敵援自楚來援艘巳度安慶余誓與值即勒全軍指上流次繁昌池軍亦至共議進止咸謂石頭雖敗江楚尚未之聞我以水師徑趨鄱陽若江右略定回師再取四郡何不可者乃決計西上八月七日次銅陵翼日抵烏沙夾果與楚艘遇余橫流奮擊沉其四舟溺死滿軍無算會日暮罷戰楚艘咸遁夜半大雷起於下流如炮聲我軍誤謂劫營一時驚散士氣始衰不復西上余不得巳沉巨艦於中流易沙船至無為州擬走焦湖集散亡為再舉適英霍義士遮余言焦湖入冬水涸不若入英霍山寨可持久余然之因盡焚舟提師登岸至桐城之黃金弸敵嚴兵駐守此為入山關隘余選鋭騎馳擊之奪馬數十匹殺敵殆盡遂由奇嶺進山皆危峰峭壁甲士素不諸山行數日士皆重用余令焚棄輜重按㘘行八月既望離危嶺入霍縣界移營楊山之東溪衆疲甚余强起按行占一數四課皆空陷因大驚令詰朝早發是日余率騎前驅方踰嶺後軍忽報大敵奄至士卒驚竄山谷余顧左右止二十餘騎步卒不滿百以單騎突圍出只一僮擕印章相隨焉嗟乎余入山非避死也尚圗控連江楚收河南北之大俠雲擾中原天下事未可知也機事不偶卒以潰敗天耶人耶午後去敵稍逺俄牙門將跳而復返與余值呼之偕行三人紆回山罔間迷失道土人多踪跡余一有力者進前詰問金出百金為夀力者即匿豫山廣期以日暮導余出薄暮力者果至懷脫粟相餉三人始變服夜走七十里兩足盡裂已餒甚乃望門投止主人問所自導者託言某係館師其牙門將則賈客也皆避兵警特為之送往於是就食復行適余散卒十許遇諸途一見驚喜導者恐耳目大駭遂疾走余竭蹶不能前且失道并失導以餘金分贈散卒使去三人復前行中途遇一貌厚者祈為導强而後可詢知為胡姓行三十里始出山險託宿焉逆旅主人胡族屬也忽胡之季狎至招其兄出耳語胡却入語余曰君自海上來耶豫季遇公散卒詰而知之季恐某導不力故來耳主人亦色喜重具雞黍嗟歎久之翼目導余出安慶渡口代余覔渡遂與胡别余擬渡江出池州徐圖歸計舟子將以詰朝解維因暫止逆旅有徐某金某自外至與余連榻坐語次余謬為應對金徐素昧平生而語言時隂左右余且目余起引入他室中問曰君得無張姓乎余愕然徐生笑曰某固知之所以紱者方余初抵安慶訪舊賔從朱生於髙河埠金素與朱密交余前帥水軍至繁昌金生浮一葉至不及登沙船遙識余面而余與朱行踪徐所熟聞也余訪朱生不遇過市中金固疑之與徐生謀曰兹生客之訪朱君得非山中使者乎故來物色余及過逆旅徐不識余也金識之始歡然以此遇為天幸余備言英霍坐困出險之事今將渡江為東歸計徐與金謀曰江工未解嚴疏虞英必固要豫至其家一宿侵晨聞皖口兵過高河市闔市奔匿余輿徐金亦避村野至一何生家金徐密友也翼日兵去金徐令何生從余由摐陽出江渡黃湓抵張灘登岸而金採别從皖口來相會於張灘灘屬池之東流何生始别去金徐導余由建德祁門走雨山中置棹漢行遭危難者非一至休邑寓徐生之諸父别業休息纍日乃達嚴陵復自東陽出天台以赴海壖浙東山路非金徐所語向者導導余兹則余導導既至海濵濵海居民咸閧然知余得生還矣回思霍山奔亡以來計程二千餘里為時二十七日間關百折何其窮也追憶自崇明進師而瓜步而潤州而和陽太平寧國而廬而嶶池及諸州邑乘勝長驅又何壯也然轉瞬間成敗異趨佹得而復失之不亦重可慨也夫己亥嘉平月紀於浙海行營紀詳載蒼水集中嗣是仍鎮臨門卒丑聞緬甸之變三上書監國曲為勸進壬寅國姓營東寧煌言馳書與之略曰大明之倚重殿下者以殿下能雪恥復仇也區區臺灣何預於赤縣神州而暴師半載使壯士塗肝䐉於火輪宿將碎肢體於沙磧生既非智死亦非忠誠大可惜矣矧普天之下止思明州一塊乾淨土四海所屬望萬世所瞻仰者何啻相江一絲繫漢九鼎夫思明者拫抵也臺彎者枝葉也棄思明是無根柢矣晉年長江之師雖敗猶榮已足流芳百世所仗殿下發憤為雄捲土重來俾日月幽而復明山河毁而復完某得全髮歸放里於願足矣乃殿下挾有為之資值可為之勢而進退佹趨某將何所依倚哉延平得書不能用癸卯厦門金門玉環楚山咸失守臨門勢益孤煌言移屯范澳糧盡議散衆甲辰秋七月二十有四日所散禆將吳國華出海别屯至陶家尖會寧波人孫惟法為北師向導僞裝商舟藏甲士伺得之國華被創投海死舟子林某死不露煌言避處一火者言之為導范澳不知也猝持之時一勇士葉雲二持槊及監犯羅倫字子木門者貫玉五人咸被縛八月煌言素袍朱履詣武林時貴重重其義尊禮之煌言拱手即以乎指心曰煌言止有此耳出就舍即不食衛者哀號願緩須臾復進食吟咏談笑如常作放歌以自遣命游西湖當事急具畫船游兩湖間賦詩曰國亡家破欲何之西子湖頭有我師日月雙懸于氏墓乾坤半壁嶽家祠慚將赤手分三席敢向丹心借一枝他日素車東浙路怒濤豈必盡鴟夷九月之七日吟五言絶我年適五九乃遇九月七大厦巳不支成仁萬事畢擲筆赴市部下五人咸從死妻董子祺收錢唐獄且十餘年有僧淡齊募飯之至是並見戮復有僧問石夜潜收其尸葬之從者五人葬於其旁問石後投繯墓東靜室䖍南語查東山散紀沈墨庵補述楊廷麟萬元吉郭維經彭期生楊文薦姚奇胤黎遂球龔葉盧觀象月中桂王其穹其窿萬發祥莊以蒞鍾良則表從諤劉孟鍧于斯昌劉天駟汪起龍程必進程矩乙酉南都不守唐藩建國八闌改元隆武倚江西義旅為重時清江楊廷麟以詞林家居率家丁會湖西道彭期生入太和合諸師戰北師螺子山一捷龍泉郭維經原兵部尚書亦奮起龍泉山中與廷麟合唐主進廷麟大學士兼兵部尚書督江西諸路師維經以原官加敕總制晉期生光祿少卿協守吉安人心稍定巳而糧竭城破廷麟間走粵請援䖍督李永茂檄期生控興國以固南贑門户廷麟以粵援至一戰復吉安逡巡數月外援不至丙戍三月吉安再破廷麟期生聯合諸營走鄠都當是時李永茂病去唐主晉萬元吉為南贑總制元吉南昌人氣概豁達初以職方從閣部楊嗣昌軍前贊畫往來軍中者五年甲申升太僕寺少卿至是以䖍撫督師壁皂口時北師猝至閣部蘇觀生守贑止發新營二百人出援皂口未戰先潰無吉不得巳退入贑固守關門闔城皇皇元吉親砍二妾以殉群情始定丙戍四月廷麟與維經期生各以兵入贑升期生太僕卿時浙紳姚奇㣧令南海唐主詔撫束粵改撫贑兵垣京山楊文薦職方番禺黎遂球間以師入贑戮力共守與北師決戰於李山九牛之間屢捷有詔旌異改郡名為忠誠府而文薦專守西門當北衝尤為奇捷久之會贑州者十餘壁約可四萬餘人北師飛帆乘水漲拂十八灘而上列營城東北阻山距城二里許畫夜鳴角張雲梯渡水逼城城中亦鳴炮應之殺傷相當敵常潜舟龜尾角伺城奇胤適分汛其地于堵中夜縋五百人挾束薪緃燔其舟敵不利退去又往往爇萬人敵大器名擲城下火發桶裂鐡菱亂飛疾若火鴉敵睨陴者震隕負傷走最後夜選死士千人負九龍鎗亂流而渡猝發鎗火延帳唐當秋深草木枯燥遍地皆火敵驚踣崖谷城堞呼噪震天地北師登舟拔營走三十里因盡屠下邑以孤贑自元吉廷麟諸公入贑戰守盡瘁閲六月矣久之北師益至廷麟方檄南安水師巨艦三百號入援半道為北師所截時廣營滇營二部之援贑者故稱最强廣兵跣足跳山谷如飛滇兵甲械犀利標鎗連弩洞胸穿札北師乘勝掩之扼其隘口兩營盡潰去贑勢沮九月北師已躡西門廷麟等立督死士縋格復退去時南安亦失守贑勢益孤各師借端稍稍引去城中僅汪起龍汪國泰金玉振徐日新王志忠等部部不能千人而别部謝之良數千人次雩都觀堂嗣聞延平失守蘇觀生託迎駕去時兩廣總制丁魁望聞唐事疾走肇慶擁立桂王監國改元永曆或邀廷麟入粵廷麟曰贑州兩粵門户某死此矣巳而江信阻絶人心皇愳北師逼贑四十里而軍左右勸期生太僕閒秩可閒請去期生拔刀自擬作書訣其子孫貽有曰我備兵文山之廬陵再轉䖍中又為文山倡義復仇故處每覽信國全集中夜悲吟擊節自壯聞車駕決䇿幸䖍據上游以觀建瓴濟則祀夏配天不失舊物不濟身非吾有慎無復作念十月之三日期生招奇胤飲臺上酒酣太息曰吾輩保危城七閲月矣援絶力窮義與城俱生死吾同鄉共事千里外死亦不孤乃罷飲謝去至夜半廷麟巡城天雨星如火亂墜營中忽小南門火起有叛將為內應城中倉猝巷戰總兵劉天駟猶槊殺數十人郭維經方巡城急促水師睨炮連發四十八門皆裂黎明北師盡入城城中士民格鬬死無算廷麟以事不可為投藕池死北師爭得其冠服以為功有子為彭士望所匿養元吉持槊戰於小南門不利走建春門投水死維經亦拒戰東門傷敵追入嵳峩寺自焚期生走章貢寶蓋樓投繯盡初姚奇㣧為諸生時讀于忠肅傳曰不復前太子是其一失卧祠求夢夢忠肅袍笏以身壓奇㣧語曰若知重乎奇㣧覺因自負每以忠孝語人人腐笑之及城陷奇㣧歎曰于公于公某知重矣即自縊遂球方負病城陷有數卒入卧遂球起拔劍睨之不中為所殺弟遂琪亦見害吏部主事龔棻新建人督水師入贑巡守甚力墮馬卧病聞變投水死後贑人立五忠祠機部揚吉人萬有僕姚建木龔與美周黎而為五復祠六修郭觀民彭而為七焉羅觀象以下自有傳續於後南贑既陷楊萬諸公同日致命有安福孝康康范生字小范初奉唐命為中書舍人協守贑北師入贑小范自念玉石不分死無名乃登髙據屋脊巍冠高座北將望見提刀一躣而上滿鞋用革滑朴倒幾墜下小范大笑以子援之得不墜固語之曰為將有大略徒恃勇得無失足耶北將驚且顫即於屋脊旁叩謝問公何人小范曰我大明官安福康范生也北將曰公恩我我當報公恩然公冠服大不便姑藏某營中聽公去留小范旋掖之自短墻而下仍以髙冠寬袖在營出入或聞於主帥主帥恕而拘之至南昌百餘日得脫著守䖍始末常論守䖍三公機部節義文章羽儀當世而見事稍遲聽言不廣六修公虛平恕集思廣益而遴方太濫馭將太寬吉人志急身先清苦絶倫而自用頗專與人或忮時以為定論然事後論人而不求其當事之苦心立言甚易三公之用短安知非三公之所長者哉而一時殉難者羅觀象與參將月中桂同投水死王其宖以兵部主事守東門初被炮蕩額見執口不恭甚死弟其㝫從死機部同里萬發祥癸朱進士守小南明倉卒中為亂兵所害贑人莊以莊知本縣事事急與其弟某咸自盡通判鍾良則瑞金人守望江樓亦自殺而死於火者為袁從諤劉孟鍧與六修之自焚同楊文薦投水被執而建春門之水湧金門之水藕池之氷若羅若月若黎之水秀氣東流入於天池溟渤香逾萬里也哉其逮至南昌者為楊文薦與員外于斯昌總戎劉天駟副將軍汪起龍文薦被拘憤鬱死三人咸慷慨就刑又同知程必進端方獨立有志理學及城危有子矩請避去毅然曰得與封疆死幸也揮矩自脫矩曰大人以身報國兒不從何之遂父子俱死以豫所得於南䖍始末如此有謂小范何以不死夫君子豈專以死責人者哉論曰閩事扼於鄭果從金堡之計如漢王之詐稱使者馳入楊萬軍以是離鄭則可而以任楊萬固朱可知也萬雖久歷戎行與楊郭之將略等耳然固䖍以持蹕為天南第一義果忠誠奉共主廣滇二師自力守垛既專諸援亦輳可幸苟安夫大勢已去而馮片紙使人數千里之外咸駢首就斃萬無幸之道也徒使忠誠夀千古噫非人之為矣江右語一查東山筆沈墨庵述揭重熙傅鼎詮曹大鎬傅雲龍揭重熙字萬年號潜銘江西臨川人丙子以選貢試南闈坐五經違式放歸聞北闈更期急赴北闈必以五經應試得雋丁丑仍以五經成進士授福寧知州俗尚侈示以朴素俗好動示以亷靜郡大治癸未秋擢南京禮部員外郎未任遭國變重熙痛憤作檄鼓義圖北向檄文不録巳東師入不果行團結義勇以保鄉里唐起閩中轉兵部職方司與鄭不協歸里戊子北師金聲桓復回嚮正自附於楚粵桂主加重熙兵部侍郎集萬人應聲桓期年聲桓敗重熙猶創呼撫贑閩廣間與曹大鎬聲勢合歷三載屢蹶復與久之糧竭衆解乃僞為賈短褐芒履亦重繭數十里隻身謁主桂林痛哭陳事主立授兵部尚書加街太子太保以廣兵數百人從復鼓故所部奮擊江閩間抗北制者期年已復不振棲武夷山自保間以便服私出相形便樵者泄之遂見執詣建寧出訊百不屈臨刑猶加網正幩有遺筆云行年四十有七不為天官至大司馬不為卑文章政事粗有名於時不為辱所耿耿者數載孤臣竟無一當以報君父後之志大而才疏者其亦可以鑒矣是日曹大鎬與同難士有輿重熙同里年亞學相若同事江閩間者為傅鼎銓字維源博學喜吟咏臨川自陳艾以後維源為後起之冠諸生時常作實劍行以見意有曰仗此萬里行努力事明主其生平已見於此矣庚辰成進士歷官侍讀闖賊陷京師隻身脫歸丙戌與職方揭萬年並舉師北拒雖烽烟劍㦸中不廢吟咏已而聞西粵永曆紀年作海風曲有云誰知今日蛟龍意不覆南船覆北船丁亥偕萬年結連閩廣山寨間關五載事敗被執于建寧之張村負械而吟有曰斷首玉寧碎剖心山不移爭留巾履在聊作漢官儀時萬年已走粵中敵拘維源于岑陽有曰岑陽關外是吾鄉剩有孤雲帶夕陽慷慨身誰憐馬革吁嗟命自託猿腸悲看烟竹幽生泣憤觸溪流響欲狂敗將不堪過故壘哀歌行路意何長時族人雲龍亦率一旅遙相應援已殉難福寧弔之以詩至廣信登舟抵章江有曰欲沉止水家何在魂赴湘流似屈原復作雙烈歌序曰南昌劉生之妻與其妾居妾宗室女也劉生痛家國破亡每嗚咽流涕戊子吾豫章再被兵二氏從夫暨子避兵為邏騎所逼吳赴南波水死朱先吳投東漢孤臣鼎銓被執待死聞而為之歌時劉生亦死於亂軍維源逮至南昌獄中遇生辰有曰率土遭陽九呼天問我辰强年摻使節遺體奉先人常答友黃帥先詩云痛墮龍湖躍劍津心將百鍊血為燐蓋棺論定存遺稿和淚詩成付史臣他不可聞而况僕鳥猶求友矧伊人死生不見交情切毁譽安知我輩真聞䖍事敗以詩弔吉人機部諸公云當年隆主眷去國動人思潜確龍為蟄鳴髙鳳正儀文山起義日止水殉身時城堞今垂盡欽公與道期絶筆作正命銘曰生不負學死不降志取義求仁庶畢吾事為辛卯八月之四日請衣冠北向再拜仍索肩輿赴市北帥義而許之挺立不可行刑復呼小椅端坐而受刃論曰動矣靜之難靜矣動之難萬年欲動而不能動者哉萬年自丙戌以後用野健恢瀘溪者二復東鄉者二復建寧者一至辛卯而失足於武夷六年之間亂其治者歷可指數而不動者如故故曰難夫事躓一時志存千古此維源之取義成仁所期在子是立言為不誣也有子德賁德浩幸存而萬年之後失傳江右語二查東山散筆沈墨庵補述姜曰廣二子失名劉士禎子肇泰肇臨肇升肇復肇謙肇順梁于涘妾張氏陳泰來子正儀文學熊維撲曽亨應兄大應曆兆恆姜曰廣字居之號燕及江西新建人萬曆己未進士以庶常授編修清介矯峻善屬文常語所知我此方腔子自未第時迄今來磨一角暨魏璫用事隂使親信交之不答因上君子小人和同之辨直斥時故都御史楊維垣恐失魏意責易革三不攛一字抵最忌削籍為民及魏敗起歷中允庚午升南祭酒巳而推吏部侍郎力援黎元寬等忤首輔溫體仁謝病歸里癸未復起南京翰林正詹講學江西社時史可法以大司馬執贄正詹之門為時所難俄聞督師孫傅庭潼關失事曰廣慮南北絶事或多變同史可法疏請皇太子監國南都以固國本且鞏祖陵收東南人心備緩急疏留中三月神京陷曰廣檄諸生大集尊經閣陳大義欲自殺從先帝㑹可法及工部尚書髙弘圖都察院張慎言京畿道御史祁彪佳臬臣雷演祚就咨册立且曰乃社稷為重矣彪佳倡議中興之辟非守文繼序所辦曰廣深然之或曰潞藩慈易民心所往方擬敦請巳鳳督馬士英髙黃二劉諸鎮兵權行檄必尊福藩可法曰尊福藩序也合䇿互月朔福王監國望日即真以髙弘圖為首輔曰廣進禮部尚書兼東閣大學士力辭改左侍郎入直可法士英皆直閣于是申拔正類為士英所忌以冊立為私恩密結勳戚中貴為死黨嗾誠意伯劉孔昭辱燕及於朝房燕及求退不許士英與阮大鋮盡翻三案燕及益求去疏言前見文武交競既慙無術調和近覩逆案重翻又愧不能寢弭遂使先帝十七年之定力頓付逝波皇上數日前之明詔競同反汗語極痛切士英遂執挺擊一案以激恕朝廷且曰策立陛下非其意也出燕及初書袖中燕及求去益急詩致仕去乙酉南都失守燕及門人楊廷麟與萬元吉起事取吉安潜書就教燕及阻會城不得達復避跡山中戍子北降金聲桓回向擁戴桂林以桂立命敦請燕及同事燕及語聲梪曰足下舉大事必先爭上流今九江既無重兵北援束至無重兵則九江可以襲取無北援即可以扼安慶而窺南都聲桓曰不可我先取南贑以合桂林借粵師以當大敵庶幾萬全燕及曰公志已定不能相强昌分一軍吾當扼上流之勝足以遏敵聲桓曰今初舉事兵力來全宜合不宜分燕及曰如此則非愚之所知故燕及雖居會城不任事聲桓遂以兵下吉安撫州建昌饒州瑞州及臨江襄州遂圍贑頓兵堅城久不下金陵有謀士說郎總督出重資糴粟以厚價招徠豫章之佑客於是米大至委積境內然後集大軍困南昌聲桓回師救之入城時江右諸郡朱價騰踊糧竭不能支㑹城陷聲桓死之燕及聞變歎曰彼專事南䖍使上流得為之備事之不成天也囑家人曰死固我素志間投井死己丑新建令密誘致燕及二子俱及於難或曰其一尚存燕及常作太史公自叙一篇大率追贊朋黨之論時有同赴金聲桓之舉者為萬安之劉士楨劉士楨字須彌天啓壬戍進士以御史歷楚藩為南通政使轉兵部左侍郎南都變避歸閩中遙授刑部尚書乙酉六月北師下南昌狥表臨將至吉安時湖西道彭期生以義帥至萬安萬安令為癸未進士梁于涘字飲光負氣節素與金聲桓有交欲馳書招之不果督師楊廷麟夙慕于涘表署監軍道仍管萬安事時總共白之裔以兵三干屯萬安擾民于涘諷居民譟苦之廷麟檄出之裔之裔遂劫巡撫鄺昭東下降聲桓導北師東下屠萬安于涘見執不屈死于涘江都人故山西籍也士楨見萬安被屠抱痛奔龍泉與兵部侍郎郭維經分檄諸下邑得敢死士數千間道走永新會總兵胡長䕃一戰復吉安遂令四子光祿寺少卿肇履督所部與廣帥陳課董以振相左右兵抵太和達廬陵九月參將徐必達戰敗勢頓乃合督師廷麟合堵吉安之水東三捷丙戍三月北軍再陷吉安士楨遣肇履往閩請援長子肇泰次子肇臨募兵於䖍肇臨以官生授之部主事至䖍墮水卒季子肇升與太僕卿李陳玉復振師信豐以援贑圍十月贑亦敗亡士楨避信䳬之僻戊子金聲桓畏嫌回向起兵南昌肇履亦合故旅同劉一鵬下吉撫諸郡攻圍贑不下肇泰肇升以偏師間走南雄戰保昌之長館橋敗績泰升陳殁九月南昌被圍肇履乞援東粵兵未至而南昌旋失聲桓死士楨與其子隱龍泉山中被逮急六子中書舍人肇頤出不屈死復收五子肇謙士楨歏曰吾所以不即死者以雲貴荊蜀之地尚在版圖冀得以有為今骨肉澌且盡吾何生絶食六日乃死士楨同邑有官生朱大厦及原任真定府同知廖彀城破咸不屈死初萬安被屠梁于涘拘至南昌聲桓使人諭降不答至訊所于涘詭曰願復至萬安以故部三千人降聲桓許之則密致故交戴國士欲潜通贑撫萬元吉以兵中道劫去國士發其事即日見戮臨死有詩云但知生富貴誰識死功名到頭成箇是方見古人情妾張氏哭訣其尸北人迫之張密懷刃不受辱自刎死時戴國士思樹功於北圖驟貴故忍棄其友竟為北人所輕悒鬱病危忽見于涘手擊之大呌而絶陳泰來字剛長江西新昌人崇禎辛未進去歷官兵科給事中辛巳周宜興再召群小奔走其門初為泰來座主心竊非之家居不出及南都再造馬阮用事益絶意仕進同里諸生熊維朴負至性素與泰來交甚厚見國事日非常與泰來緃談天下事感慨相泣下及乙酉叛將金聲桓北向引滿師為先驅破南昌泰來約維朴率所募鄉健並起北拒吳城小捷復擊水師焚其舟聲頗震與龍泉之師相應未幾龍泉失守楊郭諸公退守南贑滿師萬人困新昌泰來出戰陳殁城陷其子正儀選貢亡走粵西永曆中授平樂知縣卒於官維撲以義附泰來閲歷艱難屢挫不絀事敗往就楚督何騰蛟入幕中奉命招李赤心道卒終始不受官騰蛟題其墓道大明義士文學熊維撲墓有與泰來同時起師于臨川者為曾亨應字子家臨川人以崇禎甲戌進士厯官吏部郎中主選忤㫖免乙酉南昌就欵亨應募土人城守未經練習敵至散者幾半守禦單一戰不勝陳殁長子有筠同日殉父而大應子家之兄也明經任潯州太守北師入粵潯城破逮大應至梧州方中澗袖楊步入帥門大笑曰此吾死所矣遂及難又永豐縉紳詹兆恆猝起兵邑中亦死於亂
