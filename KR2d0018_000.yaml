body:
  text: 東山國語目録浙語一徐石麒缺浙語二查東山筆沈仲方閲高岱高朗朱大綱張鵬翼周宗彝馬鳴雷方維新沈陵蔡瑛許定俞元良潘起龍僧穎石徐職方徐汝琦運城王盛澄浙語三查東山筆沈仲方閲陸士鉉陸韜黃銑張實孚錢士馨吳統持浙語四東山散筆墨庵補述朱大典張國維張世鳯沈蘭吳邦璿方召熊汝霖浙語五東山散筆墨庵補述陳函輝陳潛夫王朝先劉孔昭徐孚遠阮駿江天保黃斌卿陳九徵李思密鄭遵儉周崔之周瑞王衡楊璣孫延齡黃甲李國禎楊鼎臣李開國李向榮焦文玉劉世勳馬泰單登雲蘇兆人黃忠孝顧明復陳六御姚志卓劉永錫楊晉爵郭貞一義英標官羅若騰沈荃期紀日靑林復齊僧無凡王妃張氏宮眷十三人一內監臨門語查東山散紀沈墨庵補述張煌言䖍南語查東山散紀沈墨庵補述楊廷麟萬元吉郭維經彭期生楊文薦姚奇胤黎遂球龔棻盧觀象月中桂王其折其窿萬發祥莊以蒞鍾良則袁從諤劉孟鍧于斯昌劉天駟汪起龍程必進程矩江右語一查東山筆沈墨庵述揭重熙傅鼎銓曹大鎬傅雲龍江右語二查東山散筆沈墨庵補述姜曰廣二子失名劉士禎子肇泰肇臨肇升肇履肇謙肇順梁于涘妾張氏陳泰來子正儀文學熊維朴曾亨應兄大應詹兆恆中州語查東山筆沈墨庵閲吳汝琦凌駉蔡鳳張垣楚語查東山筆沈墨庵閲何騰蛟閩語一黃道周缺閩語二查東山筆沈墨庵閲曹學佺齊巽周之䕫閩語三查東山散筆沈墨庵補述黃大鵬林垐林汝翥劉中藻謝宮錦陳際熙陳泰鍾潘啓烺吳炳金麗澤王士和胡奇偉周定礽閩語四查東山筆沈墨庵閲王祁粵徼語查東山筆沈墨庵閲李定國粵語一查東山散筆沈墨庵補述下同陳子壯陳邦彥麥而炫朱實蓮張家玉林洊張恂楊景華楊可觀張珣尹端安蘇觀生李翔粵語二王興連城璧郭之奇馬應房馮協揚粵語三梁朝鍾陳嘉會陸應圭鄺露黃襄卿朱家臣梁萬爵梁萬采嚴起恆吳貞育張三果曾起莘金堡陳學銓張同敞傅作霖侯偉米素圖李如星西粵語一查東山筆沈仲方閲下同瞿式耜西粵語二楊畏知王運開王運閎劉廷標王祚吳貞育張鐫蔣乾昌李欣李元開徐拯楊鍾胡士瑞趙賡禹蔡紬鄭允元周允吉朱議昶朱東旦任斗垣易士佳內監張福祿全為國曾英臺灣前語查東川筆沈仲方閲下同東寧國臺灣後語東寧國國姓成功國語補沈仲方筆南夏完淳父允彝陳子龍沈猶龍章簡李待間股之輅黃蜚沈雲生薛去疾吳勝兆侯承祖其杰徐式榖吳總兵許德溥楚湘女浙丁烈婦袁烈婦墨子語後自序並詩十九章浙語一徐石麒缺
